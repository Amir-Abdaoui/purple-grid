name: Purple-Grid CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  sast:
    name: SAST — Bandit source scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: pip install bandit==1.7.9

      - name: Run Bandit on backend source
        run: |
          bandit -r backend-api/app/ \
            --severity-level medium \
            --confidence-level medium \
            --format json \
            --output bandit-report.json \
            --exit-zero

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-sast-report
          path: bandit-report.json

  build-and-scan:
    name: Build image + Trivy CVE scan
    runs-on: ubuntu-latest
    needs: sast

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildkit
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend-api
          push: false
          tags: purple-grid-backend-api:${{ github.sha }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy — table output
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: purple-grid-backend-api:${{ github.sha }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Generate Trivy JSON report
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: purple-grid-backend-api:${{ github.sha }}
          format: json
          output: trivy-report.json
          ignore-unfixed: true
          exit-code: 0

      - name: Upload Trivy report artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-report
          path: trivy-report.json

  container-hardening-check:
    name: Verify container hardening
    runs-on: ubuntu-latest
    needs: build-and-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildkit
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: ./backend-api
          push: false
          tags: purple-grid-backend-api:test
          load: true

      - name: Verify non-root user
        run: |
          USER=$(docker run --rm --entrypoint whoami purple-grid-backend-api:test)
          echo "Container user: $USER"
          if [ "$USER" = "root" ]; then
            echo "FAIL: container is running as root"
            exit 1
          fi
          echo "PASS: container runs as $USER"

      - name: Verify no shell in image
        run: |
          if docker run --rm --entrypoint sh purple-grid-backend-api:test -c "echo found" 2>/dev/null; then
            echo "WARN: shell found in image"
          else
            echo "PASS: no shell in final image"
          fi

      - name: Print image size
        run: |
          docker images purple-grid-backend-api:test --format "Image size: {{.Size}}"